# ── BACKEND NAMESPACE ──────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: backend
data:
  APP_ENV: "production"
  LOG_LEVEL: "error"

---

apiVersion: apps/v1
kind: Deployment 
metadata:
  name: backend-deployment 
  namespace: backend
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: backend
  template:
    metadata:
      labels: 
        app: backend
    spec: 
      containers: 
        - name: flask
          image: flask-configmap-demo:v1
          imagePullPolicy: Never 
          envFrom: 
            - configMapRef:
                name: backend-config
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service 
metadata: 
  name: backend-service
  namespace: backend
spec:
  type: ClusterIP
  selector: 
    app: backend
  ports:
    - port: 5000
      targetPort: 5000

# ── FRONTEND NAMESPACE ─────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: frontend
data:
  APP_ENV: "production"
  BACKEND_URL: "http://backend-service.backend.svc.cluster.local:5000"
---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: frontend-deployment
  namespace: frontend
spec: 
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels: 
        app: frontend
    spec:
      containers: 
        - name: web
          image: nginx:1.25
          envFrom:
            - configMapRef:
                name: frontend-config
          ports: 
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend
spec: 
  type: NodePort
  selector:
    app: frontend
  ports: 
    - port: 80
      targetPort: 80
      nodePort: 30090