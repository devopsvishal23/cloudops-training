name: build-pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            -t cloudops-app:${{ github.sha }} \
            -t cloudops-app:latest \
            .

      - name: Verify image exists
        run: docker images | grep cloudops-app

      - name: Smoke test
        run: |
          docker run -d \
            --name test-app \
            -p 8080:8000 \
            -e APP_ENV=ci \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            cloudops-app:latest
          sleep 3
          curl --fail http://localhost:8080/ || exit 1

      - name: Print container logs if anything went wrong
        if: failure()
        run: docker logs test-app
