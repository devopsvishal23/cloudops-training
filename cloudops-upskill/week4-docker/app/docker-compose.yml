name: cloudops
services:
  web:
    build: .
    ports:
      - 8080:8000
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql://appuser:apppass@db:5432/appdb
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
      - POSTGRES_DB=appdb
    volumes:
    - pgdata:/var/lib/postgresql/data
  

volumes:
  pgdata: