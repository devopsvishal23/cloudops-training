name: hello-pipeline


on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Something
        run: |
          echo "Pipeline triggered by: ${{ github.actor }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
      
      - name: Look at what we checked out 
        runs: ls -la