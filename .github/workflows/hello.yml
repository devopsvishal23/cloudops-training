name: build-pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudops-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            -t cloudops-app:${{ github.sha }} \
            -t cloudops-app:latest \
            ./week4-docker

      - name: Start container
        run: |
          docker run -d \
            --name test-app \
            -p 8080:8000 \
            -e APP_ENV=ci \
            -e DATABASE_URL=postgresql://fake:fake@localhost/fake \
            cloudops-app:latest
          sleep 3

      - name: Test root endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:8080/)
          echo "Response: $RESPONSE"
          echo $RESPONSE | grep -q "cloudops upskill" || \
            (echo "FAILED: unexpected response from /" && exit 1)

      - name: Test health endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:8080/health)
          echo "Response: $RESPONSE"
          echo $RESPONSE | grep -q '"status": "ok"' || \
            (echo "FAILED: health check did not return status ok" && exit 1)

      - name: Stop and remove test container
        run: |
          docker stop test-app
          docker rm test-app

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag cloudops-app:${{ github.sha }} \
            $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker tag cloudops-app:latest \
            $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "Pushed: $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

      - name: Print container logs if anything went wrong
        if: failure()
        run: docker logs test-app || true
