
apiVersion: v1
kind: Pod
metadata: 
  name: pod-with-secret
spec: 
  containers: 
    - name: app
      image: nginx:1.25
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef: 
              name: app-secret 
              key: DB_PASSWORD
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: API_KEY


