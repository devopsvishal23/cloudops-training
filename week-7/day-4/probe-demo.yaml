apiVersion: apps/v1
kind: Deployment 
metadata: 
  name: probe-demo
spec:
  replicas: 2
  selector:
    matchLabels: 
      app: probe-demo
  template: 
    metadata:
      labels:
        app: probe-demo
    spec:
      containers: 
        - name: app
          image: nginx:1.25
          ports: 
            - containerPort: 80
          livenessProbe: 
            httpGet: 
              path: /
              port: 80
            initialDelaySeconds: 5      # wait 5s before first check
            periodSeconds: 10           # check every 10s
            failureThreshold: 3         # fail 3 times before restarting  
          
          readinessProbe: 
            httpGet: 
              path: /
              port: 80
            initialDelaySeconds: 3      # wait 3s before first check
            periodSeconds: 5           # check every 5s
            failureThreshold: 2         # fail 3 times before restarting  